<section class="create-ad-page">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="card-title mb-4" id="pageTitle">
              <i class="bi bi-plus-circle me-2"></i>Създай обява
            </h2>

            <form id="adForm">
              <!-- Title -->
              <div class="mb-4">
                <label for="title" class="form-label fw-bold">
                  Заглавие <span class="text-danger">*</span>
                </label>
                <input 
                  type="text" 
                  class="form-control form-control-lg" 
                  id="title" 
                  name="title"
                  placeholder="Въведете привлекателно заглавие"
                  maxlength="100"
                  required
                >
                <div class="form-text">Максимум 100 символа</div>
              </div>

              <!-- Description -->
              <div class="mb-4">
                <label for="description" class="form-label fw-bold">
                  Описание <span class="text-danger">*</span>
                </label>
                <textarea 
                  class="form-control" 
                  id="description" 
                  name="description"
                  rows="6"
                  placeholder="Опишете подробно вашата обява..."
                  maxlength="2000"
                  required
                ></textarea>
                <div class="form-text">Максимум 2000 символа</div>
              </div>

              <!-- Category -->
              <div class="mb-4">
                <label for="category" class="form-label fw-bold">
                  Категория <span class="text-danger">*</span>
                </label>
                <select class="form-select form-select-lg" id="category" name="category" required>
                  <option value="">Изберете категория</option>
                  <option value="electronics">Електроника</option>
                  <option value="vehicles">Превозни средства</option>
                  <option value="real-estate">Недвижими имоти</option>
                  <option value="jobs">Обяви за работа</option>
                  <option value="services">Услуги</option>
                  <option value="other">Други</option>
                </select>
              </div>

              <!-- Price -->
              <div class="mb-4">
                <label for="price" class="form-label fw-bold">
                  Цена (лв.)
                </label>
                <input 
                  type="number" 
                  class="form-control form-control-lg" 
                  id="price" 
                  name="price"
                  placeholder="0.00"
                  min="0"
                  step="0.01"
                >
                <div class="form-text">Оставете празно за "По договаряне"</div>
              </div>

              <!-- Location -->
              <div class="mb-4">
                <label for="location" class="form-label fw-bold">
                  Локация <span class="text-danger">*</span>
                </label>
                <input 
                  type="text" 
                  class="form-control form-control-lg" 
                  id="location" 
                  name="location"
                  placeholder="Град, квартал"
                  required
                >
              </div>

              <!-- Images -->
              <div class="mb-4">
                <label for="images" class="form-label fw-bold">
                  Снимки
                </label>
                <input 
                  type="file" 
                  class="form-control" 
                  id="images" 
                  name="images"
                  accept="image/*"
                  multiple
                >
                <div class="form-text">Можете да качите до 5 снимки (макс. 5MB всяка)</div>
                <div id="imagePreview" class="image-preview-container mt-3"></div>
              </div>

              <!-- Contact Phone -->
              <div class="mb-4">
                <label for="phone" class="form-label fw-bold">
                  Телефон за контакт <span class="text-danger">*</span>
                </label>
                <input 
                  type="tel" 
                  class="form-control form-control-lg" 
                  id="phone" 
                  name="phone"
                  placeholder="+359 888 123 456"
                  required
                >
              </div>

              <!-- Error Message -->
              <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
              
              <!-- Success Message -->
              <div id="successMessage" class="alert alert-success d-none" role="alert"></div>

              <!-- Action Buttons -->
              <div class="d-flex gap-2 justify-content-end">
                <button type="button" id="cancelBtn" class="btn btn-outline-secondary btn-lg">
                  <i class="bi bi-x-circle me-2"></i>Отказ
                </button>
                <button type="submit" id="saveDraftBtn" class="btn btn-outline-primary btn-lg" data-action="draft">
                  <i class="bi bi-save me-2"></i>Запази като чернова
                </button>
                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg" data-action="submit">
                  <i class="bi bi-send me-2"></i>Изпрати за одобрение
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

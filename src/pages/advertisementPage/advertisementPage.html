<section class="advertisement-page">
  <div class="container py-4">
    <!-- Loading State -->
    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Зареждане...</span>
      </div>
    </div>

    <!-- Advertisement Content -->
    <div id="adContent" class="d-none">
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/" data-link>Начало</a></li>
          <li class="breadcrumb-item active" aria-current="page" id="adBreadcrumb">Обява</li>
        </ol>
      </nav>

      <div class="row">
        <!-- Image Gallery -->
        <div class="col-lg-8">
          <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
              <div id="adImageCarousel" class="carousel slide">
                <div class="carousel-inner" id="carouselImages">
                  <div class="carousel-item active">
                    <img src="/placeholder.png" class="d-block w-100 ad-main-image" alt="Advertisement image">
                  </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#adImageCarousel" data-bs-slide="prev">
                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Предишна</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#adImageCarousel" data-bs-slide="next">
                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Следваща</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Description -->
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title mb-3">
                <i class="bi bi-file-text me-2"></i>Описание
              </h3>
              <p id="adDescription" class="ad-description"></p>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="col-lg-4">
          <!-- Main Info Card -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h2 id="adTitle" class="ad-title mb-3"></h2>
              <div class="ad-price mb-3" id="adPrice"></div>
              
              <div class="ad-meta mb-3">
                <div class="mb-2">
                  <i class="bi bi-tag me-2"></i>
                  <span id="adCategory"></span>
                </div>
                <div class="mb-2">
                  <i class="bi bi-geo-alt me-2"></i>
                  <span id="adLocation"></span>
                </div>
                <div class="mb-2">
                  <i class="bi bi-calendar me-2"></i>
                  <span id="adDate"></span>
                </div>
                <div class="mb-2">
                  <i class="bi bi-eye me-2"></i>
                  <span id="adViews">0 прегледа</span>
                </div>
              </div>

              <div id="adStatus" class="mb-3"></div>
            </div>
          </div>

          <!-- Seller Info Card -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5 class="card-title mb-3">
                <i class="bi bi-person me-2"></i>Продавач
              </h5>
              <div class="seller-info">
                <p class="mb-2">
                  <i class="bi bi-person-circle me-2"></i>
                  <span id="sellerName"></span>
                </p>
                <p class="mb-0">
                  <i class="bi bi-telephone me-2"></i>
                  <span id="sellerPhone"></span>
                </p>
              </div>
              
              <button id="contactBtn" class="btn btn-primary w-100 mt-3">
                <i class="bi bi-envelope me-2"></i>Свържи се
              </button>
            </div>
          </div>

          <!-- Action Buttons for Owner -->
          <div id="ownerActions" class="d-none">
            <div class="card shadow-sm mb-4">
              <div class="card-body">
                <h5 class="card-title mb-3">Действия</h5>
                <button id="editBtn" class="btn btn-outline-primary w-100 mb-2">
                  <i class="bi bi-pencil me-2"></i>Редактирай
                </button>
                <button id="deleteBtn" class="btn btn-outline-danger w-100 mb-2">
                  <i class="bi bi-trash me-2"></i>Изтрий
                </button>
                <button id="publishBtn" class="btn btn-success w-100 mb-2 d-none">
                  <i class="bi bi-send me-2"></i>Изпрати за одобрение
                </button>
                <button id="archiveBtn" class="btn btn-warning w-100 d-none">
                  <i class="bi bi-archive me-2"></i>Архивирай
                </button>
              </div>
            </div>
          </div>

          <!-- Admin Actions -->
          <div id="adminActions" class="d-none">
            <div class="card shadow-sm mb-4 border-warning">
              <div class="card-body">
                <h5 class="card-title mb-3 text-warning">
                  <i class="bi bi-shield-check me-2"></i>Административни действия
                </h5>
                <button id="approveBtn" class="btn btn-success w-100 mb-2">
                  <i class="bi bi-check-circle me-2"></i>Одобри
                </button>
                <button id="rejectBtn" class="btn btn-danger w-100 mb-2">
                  <i class="bi bi-x-circle me-2"></i>Отхвърли
                </button>
                <button id="adminArchiveBtn" class="btn btn-warning w-100">
                  <i class="bi bi-archive me-2"></i>Архивирай
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="text-center py-5 d-none">
      <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
      <p class="text-muted mt-3">Обявата не може да бъде заредена</p>
      <a href="/" class="btn btn-primary" data-link>Към начална страница</a>
    </div>
  </div>
</section>

<section class="advertisement-page">
  <div class="container py-4">
    <!-- Loading State -->
    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- Advertisement Content -->
    <div id="adContent" class="d-none">
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/" data-link>Home</a></li>
          <li class="breadcrumb-item active" aria-current="page" id="adBreadcrumb">Advertisement</li>
        </ol>
      </nav>

      <div class="row">
        <!-- Image Gallery -->
        <div class="col-lg-8">
          <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
              <div id="adImageCarousel" class="carousel slide">
                <div class="carousel-inner" id="carouselImages">
                  <div class="carousel-item active">
                    <img src="/placeholder.png" class="d-block w-100 ad-main-image" alt="Advertisement image">
                  </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#adImageCarousel" data-bs-slide="prev">
                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#adImageCarousel" data-bs-slide="next">
                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Next</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Description -->
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title mb-3">
                <i class="bi bi-file-text me-2"></i>Description
              </h3>
              <p id="adDescription" class="ad-description"></p>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="col-lg-4">
          <!-- Main Info Card -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h2 id="adTitle" class="ad-title mb-3"></h2>
              <div class="ad-price mb-3" id="adPrice"></div>
              
              <div class="ad-meta mb-3">
                <div class="mb-2">
                  <i class="bi bi-tag me-2"></i>
                  <span id="adCategory"></span>
                </div>
                <div class="mb-2">
                  <i class="bi bi-patch-check me-2"></i>
                  <span id="adCondition"></span>
                </div>
                <div class="mb-2">
                  <i class="bi bi-geo-alt me-2"></i>
                  <span id="adLocation"></span>
                </div>
                <div class="mb-2">
                  <i class="bi bi-calendar me-2"></i>
                  <span id="adDate"></span>
                </div>
              </div>

              <div id="adStatus" class="mb-3"></div>
            </div>
          </div>

          <!-- Seller Info Card -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5 class="card-title mb-3">
                <i class="bi bi-person me-2"></i>Seller
              </h5>
              <div class="seller-info">
                <p class="seller-contact-line mb-2">
                  <i class="bi bi-person-circle me-2"></i>
                  <span id="sellerName"></span>
                </p>
                <p class="seller-contact-line mb-2" id="sellerPhoneRow">
                  <i class="bi bi-telephone me-2"></i>
                  <span id="sellerPhone"></span>
                </p>
                <p class="seller-contact-line mb-0" id="sellerEmailRow">
                  <i class="bi bi-envelope me-2"></i>
                  <span id="sellerEmail"></span>
                </p>
              </div>

              <div id="sellerContactActions" class="d-grid gap-2 mt-3 d-none">
                <a id="callSellerBtn" class="btn" href="#" role="button">
                  <i class="bi bi-telephone me-2"></i>Call Seller
                </a>
                <a id="emailSellerBtn" class="btn" href="#" role="button">
                  <i class="bi bi-envelope me-2"></i>Email Seller
                </a>
              </div>
              
              <!-- More from this seller button -->
              <div id="moreSellerAdsSection" class="d-grid gap-2 mt-3 d-none">
                <button id="moreSellerAdsBtn" class="btn btn-outline-primary">
                  <i class="bi bi-grid me-2"></i>More from this Seller
                </button>
              </div>
            </div>
          </div>

          <!-- Action Buttons for Owner -->
          <div id="ownerActions" class="d-none">
            <div class="card shadow-sm mb-4">
              <div class="card-body">
                <h5 class="card-title mb-3">Actions</h5>
                <button id="editBtn" class="btn btn-outline-primary w-100 mb-2">
                  <i class="bi bi-pencil me-2"></i>Edit
                </button>
                <button id="deleteBtn" class="btn btn-outline-danger w-100 mb-2">
                  <i class="bi bi-trash me-2"></i>Delete
                </button>
                <button id="publishBtn" class="btn btn-success w-100 mb-2 d-none">
                  <i class="bi bi-send me-2"></i>Submit for Review
                </button>
                <button id="archiveBtn" class="btn btn-warning w-100 d-none">
                  <i class="bi bi-archive me-2"></i>Archive
                </button>
              </div>
            </div>
          </div>

          <!-- Admin Actions -->
          <div id="adminActions" class="d-none">
            <div class="card shadow-sm mb-4 border-warning">
              <div class="card-body">
                <h5 class="card-title mb-3 text-warning">
                  <i class="bi bi-shield-check me-2"></i>Admin Actions
                </h5>
                <button id="approveBtn" class="btn btn-success w-100 mb-2">
                  <i class="bi bi-check-circle me-2"></i>Approve
                </button>
                <button id="rejectBtn" class="btn btn-danger w-100 mb-2">
                  <i class="bi bi-x-circle me-2"></i>Reject
                </button>
                <button id="adminArchiveBtn" class="btn btn-warning w-100">
                  <i class="bi bi-archive me-2"></i>Archive
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="text-center py-5 d-none">
      <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
      <p class="text-muted mt-3">Advertisement could not be loaded</p>
      <a href="/" class="btn btn-primary" data-link>Back to Home</a>
    </div>
  </div>
</section>

<section class="index-page">
  <!-- Hero Section -->
  <div class="hero-section">
    <div class="container">
      <div class="row">
        <div class="col-12 text-center">
          <h1 class="hero-title">
            <i class="bi bi-megaphone me-2"></i>Welcome to Obyava
          </h1>
          <p class="hero-subtitle">Your marketplace platform</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Search and Filters -->
  <div class="search-section">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body">
              <form id="searchForm" class="row g-3">
                <div class="col-md-6">
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input 
                      type="text" 
                      class="form-control" 
                      id="searchQuery" 
                      name="searchQuery"
                      placeholder="Search by title or description..."
                    >
                  </div>
                </div>
                
                <div class="col-md-3">
                  <select class="form-select" id="categoryFilter" name="category">
                    <option value="">All categories</option>
                  </select>
                </div>
                
                <div class="col-md-3">
                  <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search me-2"></i>Search
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Advertisements Grid -->
  <div class="ads-section">
    <div class="container">
      <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
          <h2 class="section-title">
            <i class="bi bi-grid-3x3-gap me-2"></i>Ads
          </h2>
          <button id="createAdBtn" class="btn btn-success d-none">
            <i class="bi bi-plus-circle me-2"></i>Create Ad
          </button>
        </div>
      </div>

      <div id="adsGrid" class="row g-4">
        <!-- Advertisement cards will be dynamically inserted here -->
      </div>

      <div id="paginationWrap" class="text-center mt-4 d-none">
        <button id="loadMoreBtn" class="btn btn-outline-primary px-4">
          Load 8 More
        </button>
      </div>

      <div id="emptyState" class="text-center py-5 d-none">
        <i class="bi bi-inbox display-1 text-muted"></i>
        <p class="text-muted mt-3">No ads found</p>
      </div>

      <div id="loadingState" class="d-none" aria-hidden="true"></div>
    </div>
  </div>
</section>
